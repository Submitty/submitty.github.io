services:
  site:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/site
      - bundle_cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=docker
    command: bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling --config _config.yml,_config_docker.yml

volumes:
  bundle_cache:
